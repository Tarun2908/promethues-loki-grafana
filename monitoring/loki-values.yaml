# Helm values for grafana/loki (single-binary mode, filesystem storage)
# Deploy: helm install loki grafana/loki -n monitoring -f loki-values.yaml

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    retention_period: 168h
    allow_structured_metadata: true
    volume_enabled: true
  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 10m
    retention_enabled: true
    delete_request_store: filesystem

# Single binary with 1 replica
singleBinary:
  replicas: 1
  persistence:
    storageClass: ebs-sc
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

# Disable MinIO — we use local filesystem
minio:
  enabled: false

# Disable gateway — not needed for single binary
gateway:
  enabled: false

# Disable caches — saves pod slots on small clusters
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Disable all distributed-mode components
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0

# Disable monitoring components
monitoring:
  lokiCanary:
    enabled: false
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# Disable test pod
test:
  enabled: false
