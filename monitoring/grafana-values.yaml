# Helm values for grafana/grafana
# Deploy to monitoring namespace: helm install grafana grafana/grafana -n monitoring -f grafana-values.yaml

# Admin authentication — override these at install time via --set or a secrets file
adminUser: admin
adminPassword: admin

# Data sources — pre-configure Prometheus and Loki
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        editable: false

# Dashboard provisioning — load dashboards from ConfigMaps
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: los-app-dashboards
        orgId: 1
        folder: "LOS Application"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/los-app-dashboards

dashboardsConfigMaps:
  los-app-dashboards: los-app-dashboards

# Grafana server configuration for sub-path serving
grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/grafana"
    serve_from_sub_path: true

# Ingress for internet exposure via ALB at /grafana path
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  path: /grafana
  pathType: ImplementationSpecific
  hosts:
    - ""

# Service configuration
service:
  type: ClusterIP
  port: 80

# Persistence — use your EBS StorageClass
persistence:
  enabled: true
  storageClassName: ebs-sc
  size: 5Gi
